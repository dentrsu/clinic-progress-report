  <script>
    function verificationQueueApp() {
      return {
        loading: true,
        errorMsg: '',
        submitting: false,
        lastAction: '',
        result: null,
        divisionCode: '',  // derived from first record after load
        studentGroups: [], // [{ student_id, name, academic_id, calculated_year, records[] }]
        selected: {},      // { [record_id]: true }

        // ── Computed helpers ──────────────────────────────────────────────────

        totalPending() {
          return this.studentGroups.reduce((sum, g) => sum + g.records.length, 0);
        },

        totalSelected() {
          return Object.keys(this.selected).length;
        },

        isSelected(id) {
          return !!this.selected[id];
        },

        isAllStudentSelected(studentId) {
          var group = this.studentGroups.find(g => g.student_id === studentId);
          if (!group || group.records.length === 0) return false;
          return group.records.every(r => !!this.selected[r.record_id]);
        },

        someStudentSelected(studentId) {
          var group = this.studentGroups.find(g => g.student_id === studentId);
          if (!group) return false;
          return group.records.some(r => !!this.selected[r.record_id]);
        },

        // ── Division helpers ──────────────────────────────────────────────────

        hasDivisionDetails(rec) {
          return rec.book_number != null || rec.page_number != null ||
                 rec.severity != null || rec.perio_exams || rec.is_exam;
        },

        // Returns a flat list for x-for. For OPER: interleaves { _isHeader, requirement_type, count }
        // markers before each requirement group, with records sorted by book then page.
        // For other divisions: returns group.records unchanged.
        groupedRecords(group) {
          if (this.divisionCode !== 'OPER') return group.records;
          var reqMap = {}, reqOrder = [];
          group.records.forEach(function(rec) {
            var key = rec.requirement_type || '-';
            if (!reqMap[key]) { reqMap[key] = []; reqOrder.push(key); }
            reqMap[key].push(rec);
          });
          reqOrder.forEach(function(key) {
            reqMap[key].sort(function(a, b) {
              var bA = a.book_number != null ? +a.book_number : Infinity;
              var bB = b.book_number != null ? +b.book_number : Infinity;
              if (bA !== bB) return bA - bB;
              var pA = a.page_number != null ? +a.page_number : Infinity;
              var pB = b.page_number != null ? +b.page_number : Infinity;
              return pA - pB;
            });
          });
          var result = [];
          reqOrder.forEach(function(key) {
            result.push({ _isHeader: true, requirement_type: key, count: reqMap[key].length });
            reqMap[key].forEach(function(rec) { result.push(rec); });
          });
          return result;
        },

        // ── Actions ──────────────────────────────────────────────────────────

        toggleRecord(id) {
          if (this.selected[id]) {
            delete this.selected[id];
          } else {
            this.selected[id] = true;
          }
          // Force reactivity — replace the object reference
          this.selected = Object.assign({}, this.selected);
        },

        toggleStudent(studentId) {
          var group = this.studentGroups.find(g => g.student_id === studentId);
          if (!group) return;
          var allSelected = this.isAllStudentSelected(studentId);
          var updated = Object.assign({}, this.selected);
          group.records.forEach(r => {
            if (allSelected) {
              delete updated[r.record_id];
            } else {
              updated[r.record_id] = true;
            }
          });
          this.selected = updated;
        },

        bulkAction(action) {
          var selectedIds = Object.keys(this.selected);
          if (selectedIds.length === 0) return;
          if (this.submitting) return;

          // Build enriched record list for backend (carries student email/name for notifications)
          var allRecords = [];
          this.studentGroups.forEach(g => {
            g.records.forEach(r => {
              if (this.selected[r.record_id]) allRecords.push(r);
            });
          });

          this.submitting = true;
          this.lastAction = action;
          this.result = null;

          google.script.run
            .withSuccessHandler(res => {
              this.submitting = false;
              this.result = res;
              if (res.success) {
                // Remove actioned records from UI
                this.studentGroups = this.studentGroups
                  .map(g => ({
                    ...g,
                    records: g.records.filter(r => !this.selected[r.record_id])
                  }))
                  .filter(g => g.records.length > 0);
                this.selected = {};
              }
            })
            .withFailureHandler(err => {
              this.submitting = false;
              alert('Error: ' + (err.message || 'Unknown error'));
            })
            .instructorBulkUpdateRecordStatus({ records: allRecords, action: action });
        },

        // ── Utilities ─────────────────────────────────────────────────────────

        formatDate(iso) {
          if (!iso) return '-';
          try {
            var d = new Date(iso);
            return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: '2-digit' }) +
                   ' ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
          } catch (e) { return iso; }
        },

        // ── Init ──────────────────────────────────────────────────────────────

        init() {
          this.loading = true;
          this.errorMsg = '';
          google.script.run
            .withSuccessHandler(data => {
              this.studentGroups = data || [];
              // Derive division code from first available record
              this.divisionCode = '';
              for (var i = 0; i < this.studentGroups.length; i++) {
                var g = this.studentGroups[i];
                if (g.records && g.records.length > 0) {
                  this.divisionCode = g.records[0].division_code || '';
                  break;
                }
              }
              this.loading = false;
            })
            .withFailureHandler(err => {
              this.errorMsg = err.message || 'Failed to load pending verifications.';
              this.loading = false;
            })
            .instructorGetPendingVerifications();
        },
      };
    }
  </script>
  <script>
    // Mobile tap tooltip — shows title text as a bottom toast on touch
    (function () {
      var tip = document.createElement('div');
      tip.setAttribute('style', 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(27,42,74,0.93);color:#fff;padding:8px 16px;border-radius:10px;font-size:0.75rem;max-width:80vw;text-align:center;z-index:99999;pointer-events:none;display:none;line-height:1.4;box-shadow:0 4px 16px rgba(0,0,0,0.25);');
      document.body.appendChild(tip);
      var hide;
      document.addEventListener('touchstart', function (e) {
        var el = e.target.closest('[title]');
        if (!el) return;
        var text = el.getAttribute('title');
        if (!text) return;
        clearTimeout(hide);
        tip.textContent = text;
        tip.style.display = 'block';
        hide = setTimeout(function () { tip.style.display = 'none'; }, 2000);
      }, { passive: true });
      document.addEventListener('touchmove', function () {
        clearTimeout(hide);
        tip.style.display = 'none';
      }, { passive: true });
      document.addEventListener('touchend', function () {
        clearTimeout(hide);
        hide = setTimeout(function () { tip.style.display = 'none'; }, 1500);
      }, { passive: true });
    })();
  </script>
