<!-- Oracle Analytics Panel (Student View) -->
<div>

<!-- Loading State -->
<div x-show="oracleLoading" class="text-center py-6 mt-6">
  <div class="spinner w-6 h-6 border-indigo-400/50 border-t-indigo-500 mx-auto"></div>
  <p class="text-xs text-gray-400 mt-2 font-medium tracking-wide">Connecting to Oracle Analytics...</p>
</div>

<!-- Empty State -->
<div x-show="!oracleLoading && oracleData && !oracleData.snapshot" class="mt-8 animate-fade-in" style="animation-delay: 200ms">
  <div class="flex items-center gap-2 mb-2 px-1">
     <svg class="w-5 h-5 text-indigo-600 shrink-0 drop-shadow-sm" fill="none" stroke="currentColor" viewBox="0 0 24 24">
       <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
     </svg>
     <h3 class="text-sm font-bold text-gray-800 uppercase tracking-wider">Oracle Progress Intelligence</h3>
     <a :href="window.APP_URL + '?page=oracle-guide'" target="_blank"
        class="ml-1 flex items-center gap-1 text-xs text-indigo-500 hover:text-indigo-700 transition-colors"
        title="How does the Oracle work?">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="2"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 16v-4m0-4h.01"/></svg>
        How it works
     </a>
  </div>
  <div class="bg-gray-50 rounded-2xl p-6 text-center border border-gray-200 border-dashed">
    <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center mx-auto mb-3 shadow-sm border border-gray-100">
       <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
    </div>
    <h4 class="text-sm font-bold text-gray-700 mb-1">Awaiting Oracle Analysis</h4>
    <p class="text-xs text-gray-500 max-w-sm mx-auto">Your intelligence dashboard will appear here after your first treatment record is verified and the Oracle generates your progress snapshot.</p>
  </div>
</div>

<!-- Populated State -->
<template x-if="oracleData && oracleData.snapshot">
<div class="mt-8 space-y-6 animate-fade-in" style="animation-delay: 200ms">
  
  <div class="flex items-center gap-2 mb-2 px-1">
     <svg class="w-5 h-5 text-indigo-600 shrink-0 drop-shadow-sm" fill="none" stroke="currentColor" viewBox="0 0 24 24">
       <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
     </svg>
     <h3 class="text-sm font-bold text-gray-800 uppercase tracking-wider">Oracle Progress Intelligence</h3>
     <a :href="window.APP_URL + '?page=oracle-guide'" target="_blank"
        class="ml-1 flex items-center gap-1 text-xs text-indigo-500 hover:text-indigo-700 transition-colors"
        title="How does the Oracle work?">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="2"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 16v-4m0-4h.01"/></svg>
        How it works
     </a>
  </div>

  <!-- Summary Card -->
  <div class="bg-gradient-to-br from-[#1E293B] to-navy rounded-2xl p-5 shadow-xl text-white relative overflow-hidden border border-white/10">
    <div class="absolute top-0 right-0 w-32 h-32 bg-indigo-500/20 rounded-full -translate-y-10 translate-x-10 blur-xl"></div>
    <div class="absolute bottom-0 left-0 w-24 h-24 bg-blue-500/20 rounded-full translate-y-10 -translate-x-10 blur-xl"></div>
    
    <div class="flex justify-between items-start mb-5 relative z-10">
      <div>
         <p class="text-indigo-200 text-xs font-semibold uppercase tracking-wider mb-1 opacity-80">Overall Progress Score</p>
         <div class="text-4xl font-black tracking-tight flex items-baseline gap-1 drop-shadow-sm">
           <span x-text="oracleData.snapshot.progress_score"></span>
           <span class="text-lg font-medium text-indigo-300 opacity-80">/ 100</span>
         </div>
      </div>
      <div class="text-right">
         <p class="text-indigo-200 text-xs font-semibold uppercase tracking-wider mb-1 opacity-80">Status</p>
         <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-bold ring-1 ring-inset shadow-inner"
                 :class="{
                   'bg-emerald-500/20 text-emerald-300 ring-emerald-500/30': oracleData.snapshot.risk_level === 'On Track',
                   'bg-amber-500/10 text-amber-300 ring-amber-500/20': oracleData.snapshot.risk_level === 'At Risk',
                   'bg-orange-500/20 text-orange-300 ring-orange-500/30': oracleData.snapshot.risk_level === 'High Risk',
                   'bg-red-500/20 text-red-100 ring-red-500/30': oracleData.snapshot.risk_level === 'Critical'
                 }">
           <span class="w-1.5 h-1.5 rounded-full shadow-[0_0_8px_rgba(255,255,255,0.5)]" 
                 :class="{
                   'bg-emerald-400': oracleData.snapshot.risk_level === 'On Track',
                   'bg-amber-400': oracleData.snapshot.risk_level === 'At Risk',
                   'bg-orange-400': oracleData.snapshot.risk_level === 'High Risk',
                   'bg-red-400': oracleData.snapshot.risk_level === 'Critical'
                 }"></span>
           <span x-text="oracleData.snapshot.risk_level"></span>
         </span>
      </div>
    </div>
    
    <div class="grid grid-cols-2 gap-4 border-t border-white/10 pt-4 relative z-10">
      <div>
         <p class="text-indigo-200 text-[0.65rem] uppercase tracking-wider mb-1 flex items-center gap-1 opacity-80">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
            30-Day Velocity
         </p>
         <p class="font-bold text-lg" x-text="(oracleData.snapshot.velocity_30d > 0 ? '+' : '') + oracleData.snapshot.velocity_30d + ' pts/mo'"></p>
      </div>
      <div>
         <p class="text-indigo-200 text-[0.65rem] uppercase tracking-wider mb-1 flex items-center gap-1 opacity-80">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            Est. Completion
         </p>
         <p class="font-bold text-lg" x-text="oracleData.snapshot.forecast_completion_date ? formatDate(oracleData.snapshot.forecast_completion_date) : 'Analyzing...'"></p>
      </div>
    </div>
  </div>

  <!-- Explanations & Bottlenecks -->
  <div x-show="oracleData.explanations && oracleData.explanations.length > 0" class="bg-white rounded-xl border border-gray-100 shadow-sm p-5 hover:shadow-md transition-shadow">
    <h4 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-4 border-b border-gray-100 pb-2 flex items-center gap-2">
       <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
       Key Factors & Bottlenecks
    </h4>
    <div class="space-y-4">
      <template x-for="exp in oracleData.explanations" :key="exp.factor_name">
         <div class="flex items-start gap-3 group">
           <div class="shrink-0 mt-0.5 transition-transform group-hover:scale-110">
             <template x-if="exp.impact_score < 0">
               <div class="w-6 h-6 rounded-full bg-red-50 flex items-center justify-center border border-red-100 ring-4 ring-white shadow-sm">
                 <svg class="w-3.5 h-3.5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 14l-7 7m0 0l-7-7m7 7V3"/></svg>
               </div>
             </template>
             <template x-if="exp.impact_score > 0">
               <div class="w-6 h-6 rounded-full bg-emerald-50 flex items-center justify-center border border-emerald-100 ring-4 ring-white shadow-sm">
                 <svg class="w-3.5 h-3.5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 10l7-7m0 0l7 7m-7-7v18"/></svg>
               </div>
             </template>
             <template x-if="exp.impact_score == 0">
               <div class="w-6 h-6 rounded-full bg-gray-50 flex items-center justify-center border border-gray-200 ring-4 ring-white shadow-sm">
                 <svg class="w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 12h14"/></svg>
               </div>
             </template>
           </div>
           <div>
             <h5 class="text-sm font-bold text-gray-800" x-text="exp.factor_name"></h5>
             <p class="text-[0.75rem] text-gray-500 leading-relaxed mt-0.5" x-text="exp.description"></p>
           </div>
         </div>
      </template>
    </div>
  </div>

  <!-- Recommendations / Next Actions -->
  <div x-show="oracleData.recommendations && oracleData.recommendations.length > 0">
    <h4 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-3 px-1 flex items-center gap-2">
       <svg class="w-4 h-4 text-emerald-500 drop-shadow-sm" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>
       Recommended Next Actions
    </h4>
    <div class="space-y-2.5">
      <template x-for="rec in oracleData.recommendations" :key="rec.priority_rank">
        <div class="bg-gradient-to-r from-emerald-50/50 to-white rounded-xl border border-emerald-100/60 p-4 shadow-sm relative overflow-hidden group hover:shadow-md transition-all hover:-translate-y-0.5">
          <div class="absolute left-0 top-0 bottom-0 w-1 bg-emerald-400/80"></div>
          <div class="flex gap-3">
            <div class="shrink-0 mt-0.5">
               <div class="w-7 h-7 rounded-lg bg-emerald-100 text-emerald-700 font-extrabold text-sm flex items-center justify-center shadow-inner" x-text="rec.priority_rank"></div>
            </div>
            <div>
              <p class="text-[0.65rem] font-bold text-emerald-600 uppercase tracking-wider mb-0.5" x-text="rec.action_type"></p>
              <p class="text-sm font-medium text-gray-800 leading-snug" x-text="rec.description"></p>
            </div>
          </div>
        </div>
      </template>
    </div>
  </div>

  <div class="text-center pb-2">
    <p class="text-[0.6rem] text-gray-400 font-medium">Oracle snapshot last updated: <span class="font-mono text-gray-500" x-text="formatDate(oracleData.snapshot.last_calculated_at)"></span></p>
  </div>
</template>

</div>

</div>
